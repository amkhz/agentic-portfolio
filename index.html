<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Justin Hernandez | Product Designer</title>
    <meta name="description" content="Lead product designer specializing in AI-powered enterprise product design." />
    <script>
      (function(){
        try {
          var m = document.cookie.match(/(?:^|;\s*)theme=(dark|light)/);
          var t = m ? m[1] : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
          document.documentElement.setAttribute('data-theme', t);
          document.documentElement.setAttribute('data-no-transition', '');
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
