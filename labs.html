<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Perihelion — labs.justinh.design</title>
    <meta name="description" content="Perihelion. A research archive and an applied design practice at closest approach to the frontier. Deep-dive guides on frontier physics, vacuum engineering, UAP detection, and consciousness as technology." />

    <!-- Static OG/Twitter tags for social scrapers, which never execute the
         React app. Per-route og tags rendered by LibraryIndex/GuideView
         override these in-browser only; scrapers see this house card.
         The image must be an absolute URL: scrapers do not resolve
         relative paths against the crawled origin reliably. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://labs.justinh.design/" />
    <meta property="og:title" content="Perihelion Archive" />
    <meta property="og:description" content="Research guides at closest approach to the frontier." />
    <meta property="og:image" content="https://labs.justinh.design/labs/og-house.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Perihelion Archive. An eccentric orbit mark with a brass dot at closest approach, beside the Perihelion wordmark and the tagline: closest approach to the frontier." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Perihelion Archive" />
    <meta name="twitter:description" content="Research guides at closest approach to the frontier." />
    <meta name="twitter:image" content="https://labs.justinh.design/labs/og-house.png" />
    <script>
      // If we arrived here because the portfolio's index.html bounced the
      // lab subdomain root to /labs.html (see the workaround in index.html),
      // swap the URL back to '/' so React Router's lab routes match. React
      // Router reads window.location.pathname when it mounts; replaceState
      // updates that silently without reloading.
      (function(){
        try {
          if (window.location.pathname === '/labs.html') {
            var clean = '/' + window.location.search + window.location.hash;
            window.history.replaceState(null, '', clean);
          }
        } catch(e) {}
      })();
    </script>
    <script>
      (function(){
        try {
          var m = document.cookie.match(/(?:^|;\s*)theme=(dark|light)/);
          var t = m ? m[1] : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
          document.documentElement.setAttribute('data-theme', t);
          document.documentElement.setAttribute('data-no-transition', '');
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/lab/main.tsx"></script>
  </body>
</html>
