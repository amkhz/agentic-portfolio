<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Perihelion — labs.justinh.design</title>
    <meta name="description" content="Perihelion. A research archive and an applied design practice at closest approach to the frontier. Deep-dive guides on frontier physics, vacuum engineering, UAP detection, and consciousness as technology." />
    <script>
      // If we arrived here because the portfolio's index.html bounced the
      // lab subdomain root to /labs.html (see the workaround in index.html),
      // swap the URL back to '/' so React Router's lab routes match. React
      // Router reads window.location.pathname when it mounts; replaceState
      // updates that silently without reloading.
      (function(){
        try {
          if (window.location.pathname === '/labs.html') {
            var clean = '/' + window.location.search + window.location.hash;
            window.history.replaceState(null, '', clean);
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/lab/main.tsx"></script>
  </body>
</html>
